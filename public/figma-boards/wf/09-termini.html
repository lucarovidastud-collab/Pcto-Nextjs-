<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>09 — Termini</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1440px; min-height: 900px; font-family: Inter, system-ui, sans-serif;
      background: #f4f4f5; color: #18181b;
      
    }
    .wrap { padding: 0; }
    .glass {
      background: #ffffff; border: 1px solid #e4e4e7;
      border-radius: 4px; backdrop-filter: blur(8px);
    }
    .btn-p {
      background: #3f3f46;
      color: #fff; border: none; border-radius: 4px;
      padding: 12px 20px; font-weight: 800; font-size: 13px;
    }
    .btn-s {
      background: #fff;
      border: 1px solid #e4e4e7; border-radius: 4px;
      padding: 12px 20px; font-weight: 700; font-size: 13px; color: #18181b;
    }
    .muted { color: #71717a; }
    .accent { color: #52525b; }
    .grad {
      color: #18181b;
    }
    h1 { font-size: 56px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; }
    h2 { font-size: 28px; font-weight: 900; }
    h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #71717a; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid #e4e4e7; background: #fff;
      color: #52525b;
    }
    .block { height: 12px; background: #d4d4d8; border-radius: 4px; }
    .block.sm { width: 40%; height: 8px; }
    .block.md { width: 65%; }
    .block.lg { width: 90%; }
    .placeholder {
      background: #e4e4e7;
      border: 1px dashed #a1a1aa; border-radius: 4px;
    }
  </style>
</head>
<body data-screen="09 — Termini" data-mode="wf">
  <div class="wrap"><main style="padding:64px 48px"><div class="block sm"></div><div class="block lg" style="margin-top:20px;height:32px"></div><div class="block md" style="margin-top:16px"></div><div class="block lg" style="margin-top:12px"></div></main></div>
</body>
</html>
