<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>03 — Workspace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1440px; min-height: 900px; font-family: Inter, system-ui, sans-serif;
      background: #f4f4f5; color: #18181b;
      
    }
    .wrap { padding: 0; }
    .glass {
      background: #ffffff; border: 1px solid #e4e4e7;
      border-radius: 4px; backdrop-filter: blur(8px);
    }
    .btn-p {
      background: #3f3f46;
      color: #fff; border: none; border-radius: 4px;
      padding: 12px 20px; font-weight: 800; font-size: 13px;
    }
    .btn-s {
      background: #fff;
      border: 1px solid #e4e4e7; border-radius: 4px;
      padding: 12px 20px; font-weight: 700; font-size: 13px; color: #18181b;
    }
    .muted { color: #71717a; }
    .accent { color: #52525b; }
    .grad {
      color: #18181b;
    }
    h1 { font-size: 56px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; }
    h2 { font-size: 28px; font-weight: 900; }
    h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #71717a; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid #e4e4e7; background: #fff;
      color: #52525b;
    }
    .block { height: 12px; background: #d4d4d8; border-radius: 4px; }
    .block.sm { width: 40%; height: 8px; }
    .block.md { width: 65%; }
    .block.lg { width: 90%; }
    .placeholder {
      background: #e4e4e7;
      border: 1px dashed #a1a1aa; border-radius: 4px;
    }
  </style>
</head>
<body data-screen="03 — Workspace" data-mode="wf">
  <div class="wrap"><header class="glass" style="display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-left:0;border-right:0;border-top:0">
    <div style="display:flex;align-items:center;gap:12px;font-weight:900;font-size:18px"><span style="width:36px;height:36px;border-radius:4px;background:#d4d4d8;display:inline-block"></span><span>QuoteGen <span class="grad">Engine</span></span></div>
    <div style="display:flex;gap:12px"><button class="btn-s">Accedi</button></div>
  </header>
  <div style="padding:32px 48px"><div class="block md"></div>
  <div style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:24px;margin-top:24px">
    <div class="placeholder" style="height:380px"></div><div class="placeholder" style="height:380px"></div>
  </div></div></div>
</body>
</html>
