<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>03 — Workspace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1440px; min-height: 900px; font-family: Inter, system-ui, sans-serif;
      background: #faf9f6; color: #0f172a;
      background-image: radial-gradient(circle at 20% 20%, rgba(13,148,136,0.08), transparent 40%), radial-gradient(circle at 80% 0%, rgba(139,92,246,0.1), transparent 35%);
    }
    .wrap { padding: 0; }
    .glass {
      background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 16px; backdrop-filter: blur(8px);
    }
    .btn-p {
      background: linear-gradient(135deg, #0d9488, #8b5cf6);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 20px; font-weight: 800; font-size: 13px;
    }
    .btn-s {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 12px;
      padding: 12px 20px; font-weight: 700; font-size: 13px; color: #0f172a;
    }
    .muted { color: #475569; }
    .accent { color: #0d9488; }
    .grad {
      background: linear-gradient(90deg, #0d9488, #8b5cf6); -webkit-background-clip: text; color: transparent;
    }
    h1 { font-size: 56px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; }
    h2 { font-size: 28px; font-weight: 900; }
    h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #475569; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid rgba(15, 23, 42, 0.08); background: rgba(255,255,255,0.6);
      color: #0d9488;
    }
    .block { height: 12px; background: rgba(15, 23, 42, 0.08); border-radius: 4px; }
    .block.sm { width: 40%; height: 8px; }
    .block.md { width: 65%; }
    .block.lg { width: 90%; }
    .placeholder {
      background: rgba(15,23,42,0.06);
      border: 1px dashed rgba(15, 23, 42, 0.08); border-radius: 16px;
    }
  </style>
</head>
<body data-screen="03 — Workspace" data-mode="hifi">
  <div class="wrap"><header class="glass" style="display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-left:0;border-right:0;border-top:0">
    <div style="display:flex;align-items:center;gap:12px;font-weight:900;font-size:18px"><span style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#0d9488,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px">✦</span><span>QuoteGen <span class="grad"></span></span></div>
    <div style="display:flex;gap:12px"><button class="btn-s">Accedi</button></div>
  </header>
  <div style="padding:32px 48px;max-width:1200px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px">
      <div><h2>Nuovo preventivo</h2><p class="muted" style="margin-top:8px">Compila i dati e genera la proposta con AI</p></div>
      <div class="glass" style="padding:12px 20px;font-size:12px;font-weight:800"><span class="accent">3/10</span> preventivi questo mese</div>
    </div>
    <div style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:24px">
      <div class="glass" style="padding:28px">
        <h3>Dati cliente</h3>
        <div class="placeholder" style="height:44px;margin-top:16px"></div>
        <div class="placeholder" style="height:44px;margin-top:12px"></div>
        <div class="placeholder" style="height:120px;margin-top:12px"></div>
        <button class="btn-p" style="margin-top:24px;width:100%">Genera proposta AI</button>
      </div>
      <div class="glass" style="padding:28px">
        <h3>Brand estratto</h3>
        <div style="display:flex;gap:8px;margin-top:16px">
          <span style="width:40px;height:40px;border-radius:8px;background:#0d9488"></span>
          <span style="width:40px;height:40px;border-radius:8px;background:#8b5cf6"></span>
          <span style="width:40px;height:40px;border-radius:8px;background:#f59e0b"></span>
        </div>
        <p class="muted" style="margin-top:16px;font-size:13px">Palette da kfc.com · Budget €24.500</p>
      </div>
    </div>
  </div></div>
</body>
</html>
