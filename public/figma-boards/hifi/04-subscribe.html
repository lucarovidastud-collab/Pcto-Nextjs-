<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>04 — Subscribe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1440px; min-height: 900px; font-family: Inter, system-ui, sans-serif;
      background: #faf9f6; color: #0f172a;
      background-image: radial-gradient(circle at 20% 20%, rgba(13,148,136,0.08), transparent 40%), radial-gradient(circle at 80% 0%, rgba(139,92,246,0.1), transparent 35%);
    }
    .wrap { padding: 0; }
    .glass {
      background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 16px; backdrop-filter: blur(8px);
    }
    .btn-p {
      background: linear-gradient(135deg, #0d9488, #8b5cf6);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 20px; font-weight: 800; font-size: 13px;
    }
    .btn-s {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 12px;
      padding: 12px 20px; font-weight: 700; font-size: 13px; color: #0f172a;
    }
    .muted { color: #475569; }
    .accent { color: #0d9488; }
    .grad {
      background: linear-gradient(90deg, #0d9488, #8b5cf6); -webkit-background-clip: text; color: transparent;
    }
    h1 { font-size: 56px; font-weight: 900; line-height: 1.05; letter-spacing: -0.03em; }
    h2 { font-size: 28px; font-weight: 900; }
    h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #475569; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 800;
      border: 1px solid rgba(15, 23, 42, 0.08); background: rgba(255,255,255,0.6);
      color: #0d9488;
    }
    .block { height: 12px; background: rgba(15, 23, 42, 0.08); border-radius: 4px; }
    .block.sm { width: 40%; height: 8px; }
    .block.md { width: 65%; }
    .block.lg { width: 90%; }
    .placeholder {
      background: rgba(15,23,42,0.06);
      border: 1px dashed rgba(15, 23, 42, 0.08); border-radius: 16px;
    }
  </style>
</head>
<body data-screen="04 — Subscribe" data-mode="hifi">
  <div class="wrap"><header class="glass" style="display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-left:0;border-right:0;border-top:0">
    <div style="display:flex;align-items:center;gap:12px;font-weight:900;font-size:18px"><span style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#0d9488,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px">✦</span><span>QuoteGen <span class="grad">Engine</span></span></div>
    <div style="display:flex;gap:12px"><button class="btn-s">Accedi</button></div>
  </header>
  <div style="padding:48px;max-width:1100px;margin:0 auto;text-align:center">
    <p class="chip">Accesso alle funzionalità</p>
    <h2 style="margin-top:16px">Attiva il tuo abbonamento</h2>
    <p class="muted" style="margin-top:12px">Piani Starter, Pro e Enterprise per generare preventivi con AI.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;text-align:left">
      <div class="glass" style="padding:24px;"><h3>Starter</h3><p style="font-size:32px;font-weight:900;margin:12px 0">€29<span class="muted" style="font-size:14px">/mese</span></p><button class="btn-s" style="width:100%">Scegli piano</button></div><div class="glass" style="padding:24px;border-color:#0d9488;box-shadow:0 12px 40px rgba(13,148,136,0.15)"><h3>Pro</h3><p style="font-size:32px;font-weight:900;margin:12px 0">€79<span class="muted" style="font-size:14px">/mese</span></p><button class="btn-p" style="width:100%">Scegli piano</button></div><div class="glass" style="padding:24px;"><h3>Enterprise</h3><p style="font-size:32px;font-weight:900;margin:12px 0">€199<span class="muted" style="font-size:14px">/mese</span></p><button class="btn-s" style="width:100%">Scegli piano</button></div>
    </div>
  </div></div>
</body>
</html>
